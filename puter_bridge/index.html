<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CU Advisor Auth</title>
  <script src="https://js.puter.com/v2/"></script>
  <style>
    :root {
      --primary-color: #4285F4;
      --text-color: #3c4043;
      --bg-color: #ffffff;
      --border-color: #dadce0;
    }
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: 'Google Sans', Roboto, Arial, sans-serif;
      background: transparent;
    }
    .auth-card {
      background: var(--bg-color);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 1px 2px 0 rgba(60,64,67,0.30), 0 1px 3px 1px rgba(60,64,67,0.15);
      width: 280px;
      margin: 0 auto;
    }
    .logo-container {
      margin-bottom: 16px;
    }
    .title {
      font-size: 18px;
      font-weight: 500;
      color: var(--text-color);
      margin-bottom: 8px;
      text-align: center;
    }
    .subtitle {
      font-size: 14px;
      color: #70757a;
      margin-bottom: 24px;
      text-align: center;
    }
    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: white;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      color: var(--text-color);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      padding: 10px 16px;
      transition: background-color .2s, box-shadow .2s;
      width: 100%;
      gap: 12px;
    }
    .google-btn:hover {
      background-color: #f8f9fa;
      box-shadow: 0 1px 1px 0 rgba(66,133,244,0.45), 0 1px 3px 1px rgba(66,133,244,0.3);
    }
    .google-icon {
      width: 18px;
      height: 18px;
    }
    .input-field {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      margin-bottom: 16px;
      font-size: 14px;
      box-sizing: border-box;
    }
    .save-btn {
      background-color: var(--primary-color);
      color: white;
      border: none;
      border-radius: 4px;
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      width: 100%;
    }
    .save-btn:hover {
      background-color: #3367d6;
    }
    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #1e8e3e;
      font-weight: 500;
      font-size: 14px;
    }
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #e8eaed;
      border-top: 2px solid var(--primary-color);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="ui-root">
    <div class="auth-card">
      <div class="status-badge"><div class="spinner"></div> Connecting...</div>
    </div>
  </div>

  <script>
    const Streamlit = {
      setComponentValue: function(value) {
        window.parent.postMessage({
          isStreamlitMessage: true,
          type: "streamlit:setComponentValue",
          value: value
        }, "*");
      },
      setFrameHeight: function(height) {
        window.parent.postMessage({
          isStreamlitMessage: true,
          type: "streamlit:setFrameHeight",
          height: height
        }, "*");
      }
    };

    let lastRequestId = null;

    function renderLogin() {
      const root = document.getElementById('ui-root');
      root.innerHTML = `
        <div class="auth-card">
          <div class="logo-container">
            <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" width="75">
          </div>
          <div class="title">Sign in to CU Advisor</div>
          <div class="subtitle">to enable AI mode & persistent history</div>
          <button class="google-btn" id="login-btn">
            <svg class="google-icon" viewBox="0 0 24 24">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"/>
            </svg>
            Sign in with Google
          </button>
        </div>
      `;
      document.getElementById('login-btn').onclick = handleLogin;
      Streamlit.setFrameHeight(220);
    }

    function renderUsernamePrompt() {
      const root = document.getElementById('ui-root');
      root.innerHTML = `
        <div class="auth-card">
          <div class="title">Choose your username</div>
          <div class="subtitle">This name will be used in your reports</div>
          <input type="text" id="username-input" class="input-field" placeholder="Enter student name...">
          <button id="save-username-btn" class="save-btn">Get Started</button>
        </div>
      `;
      document.getElementById('save-username-btn').onclick = saveUsername;
      Streamlit.setFrameHeight(200);
    }

    function renderStatus(msg, detail = "", type = "loading") {
      const root = document.getElementById('ui-root');
      const detailHtml = detail ? `<div style="font-size: 11px; color: #70757a; margin-top: 4px; font-weight: 400;">${detail}</div>` : '';
      const icon = type === 'loading' ? '<div class="spinner"></div>' : '✅';
      const color = type === 'loading' ? '#4285F4' : '#1e8e3e';
      
      root.innerHTML = `
        <div class="auth-card" style="padding: 16px;">
          <div class="status-badge" style="color: ${color};">
            ${icon} ${msg}
          </div>
          ${detailHtml}
        </div>
      `;
      Streamlit.setFrameHeight(80);
    }

    async function handleLogin() {
      try {
        renderStatus("Redirecting to Google...");
        // Direct Google Login (Bypasses Puter provider selection)
        await puter.auth.signIn({ method: 'google' });
        checkAuth(); 
      } catch (err) {
        console.error("Login failed", err);
        renderLogin();
      }
    }

    async function saveUsername() {
      const username = document.getElementById('username-input').value.trim();
      if (!username) return;
      
      renderStatus("Personalizing your account...");
      try {
        await puter.kv.set('app_username', username);
        checkAuth();
      } catch (err) {
        console.error("Failed to save username", err);
        renderUsernamePrompt();
      }
    }

    async function checkAuth() {
      try {
        if (puter.auth.isSignedIn()) {
          const customUsername = await puter.kv.get('app_username');
          
          if (!customUsername) {
            renderUsernamePrompt();
            return;
          }

          const user = await puter.auth.getUser();
          
          Streamlit.setComponentValue({
            type: 'auth',
            status: 'success',
            user: {
              name: customUsername,
              puter_name: user.username,
              email: user.email || user.username + "@puter.com"
            }
          });
          renderStatus("AI mode is now enabled", "Logged in as " + customUsername, "success");
        } else {
          renderLogin();
        }
      } catch (err) {
        console.error("Auth check failed", err);
        renderLogin();
      }
    }

    async function onRender(event) {
      if (event.data.type !== "streamlit:render") return;
      
      const args = event.data.args;

      if (args.command === 'sign_out') {
        if (puter.auth.isSignedIn()) {
          await puter.auth.signOut();
        }
        renderLogin();
        Streamlit.setComponentValue({ type: 'auth_cleared' });
        return;
      }

      if (args.command === 'get_token') {
        if (!puter.auth.isSignedIn()) {
          renderStatus("Waiting for Maker Login...", "Please click the Google button to link your account.");
          renderLogin();
        } else {
          const token = puter.auth.getAuthToken();
          const user = await puter.auth.getUser();
          Streamlit.setComponentValue({
            type: 'maker_token',
            token: token,
            user: user.username
          });
          renderStatus("✅ Maker Account Linked", "Token captured for backend AI.", "success");
        }
        return;
      }

      // --- NEW: ANONYMOUS CHAT COMMAND ---
      if (args.command === 'anonymous_chat') {
        if (!args.request_id || args.request_id === lastRequestId) return;
        
        lastRequestId = args.request_id;
        // Make the component "headless" (invisible) during this operation
        Streamlit.setFrameHeight(1); 
        
        try {
          const response = await puter.ai.chat(args.messages, {
            model: args.model || 'gpt-4o-mini'
          });
          
          Streamlit.setComponentValue({
            type: 'ai_response',
            status: 'success',
            request_id: lastRequestId,
            message: response.message
          });
        } catch (err) {
          console.error("Anonymous AI Request failed", err);
          Streamlit.setComponentValue({
            type: 'ai_response',
            status: 'error',
            request_id: lastRequestId,
            error: err.toString()
          });
        }
        return;
      }
      
      if (!puter.auth.isSignedIn()) {
        renderLogin();
        return;
      }

      // Check if we have a username
      const customUsername = await puter.kv.get('app_username');
      if (!customUsername) {
        renderUsernamePrompt();
        return;
      }

      if (!args.request_id) {
        renderStatus("AI mode is now enabled", "Logged in as " + customUsername, "success");
        return;
      }

      if (args.request_id === lastRequestId) {
        return;
      }

      lastRequestId = args.request_id;
      renderStatus("AI Advisor is thinking...", "Request: " + lastRequestId.substring(0, 8));

      try {
        const response = await puter.ai.chat(args.messages, {
          model: args.model || 'gpt-4o-mini'
        });
        
        Streamlit.setComponentValue({
          type: 'ai_response',
          status: 'success',
          request_id: lastRequestId,
          message: response.message
        });
        renderStatus("AI mode is now enabled", "Logged in as " + customUsername, "success");
      } catch (err) {
        console.error("AI Request failed", err);
        Streamlit.setComponentValue({
          type: 'ai_response',
          status: 'error',
          request_id: lastRequestId,
          error: err.toString()
        });
        renderStatus("AI Connection issue", err.message, "loading");
      }
    }

    // Wait for Puter to be ready
    const checkPuter = setInterval(async () => {
      if (typeof puter !== 'undefined') {
        clearInterval(checkPuter);
        
        // SESSION PERFECTION LOGIC:
        // We only clear residual sessions if we find them, 
        // but we don't trigger the UI yet.
        if (puter.auth.isSignedIn()) {
          const hasUsername = await puter.kv.get('app_username');
          if (!hasUsername) {
            await puter.auth.signOut();
          }
        }
        
        window.parent.postMessage({
          isStreamlitMessage: true,
          type: "streamlit:componentReady",
          apiVersion: 1
        }, "*");
      }
    }, 100);

    window.addEventListener("message", onRender);
  </script>
</body>
</html>
