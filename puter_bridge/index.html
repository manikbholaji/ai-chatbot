<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CU Advisor Auth</title>
  <script src="https://js.puter.com/v2/"></script>
  <style>
    :root {
      --primary-color: #4285F4;
      --text-color: #3c4043;
      --bg-color: #ffffff;
      --border-color: #dadce0;
    }
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: 'Google Sans', Roboto, Arial, sans-serif;
      background: transparent;
    }
    .auth-card {
      background: var(--bg-color);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 1px 2px 0 rgba(60,64,67,0.30), 0 1px 3px 1px rgba(60,64,67,0.15);
      width: 280px;
      margin: 0 auto;
    }
    .logo-container {
      margin-bottom: 16px;
    }
    .title {
      font-size: 18px;
      font-weight: 500;
      color: var(--text-color);
      margin-bottom: 8px;
      text-align: center;
    }
    .subtitle {
      font-size: 14px;
      color: #70757a;
      margin-bottom: 24px;
      text-align: center;
    }
    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: white;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      color: var(--text-color);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      padding: 10px 16px;
      transition: background-color .2s, box-shadow .2s;
      width: 100%;
      gap: 12px;
    }
    .google-btn:hover {
      background-color: #f8f9fa;
      box-shadow: 0 1px 1px 0 rgba(66,133,244,0.45), 0 1px 3px 1px rgba(66,133,244,0.3);
    }
    .google-icon {
      width: 18px;
      height: 18px;
    }
    .input-field {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      margin-bottom: 16px;
      font-size: 14px;
      box-sizing: border-box;
    }
    .save-btn {
      background-color: var(--primary-color);
      color: white;
      border: none;
      border-radius: 4px;
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      width: 100%;
    }
    .save-btn:hover {
      background-color: #3367d6;
    }
    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #1e8e3e;
      font-weight: 500;
      font-size: 14px;
    }
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #e8eaed;
      border-top: 2px solid var(--primary-color);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="ui-root" style="display: none;"></div>

  <script>
    const Streamlit = {
      setComponentValue: function(value) {
        window.parent.postMessage({
          isStreamlitMessage: true,
          type: "streamlit:setComponentValue",
          value: value
        }, "*");
      },
      setFrameHeight: function(height) {
        window.parent.postMessage({
          isStreamlitMessage: true,
          type: "streamlit:setFrameHeight",
          height: height
        }, "*");
      }
    };

    let lastRequestId = null;

    async function onRender(event) {
      if (event.data.type !== "streamlit:render") return;
      
      const args = event.data.args;

      // Only handle anonymous_chat command now
      if (args.command === 'anonymous_chat') {
        if (!args.request_id || args.request_id === lastRequestId) return;
        
        lastRequestId = args.request_id;
        Streamlit.setFrameHeight(1); 
        
        try {
          const response = await puter.ai.chat(args.messages, {
            model: args.model || 'gpt-4o-mini'
          });
          
          Streamlit.setComponentValue({
            type: 'ai_response',
            status: 'success',
            request_id: lastRequestId,
            message: response.message
          });
        } catch (err) {
          console.error("AI Request failed", err);
          Streamlit.setComponentValue({
            type: 'ai_response',
            status: 'error',
            request_id: lastRequestId,
            error: err.toString()
          });
        }
      }
    }

    // Wait for Puter to be ready
    const checkPuter = setInterval(async () => {
      if (typeof puter !== 'undefined') {
        clearInterval(checkPuter);
        window.parent.postMessage({
          isStreamlitMessage: true,
          type: "streamlit:componentReady",
          apiVersion: 1
        }, "*");
      }
    }, 100);

    window.addEventListener("message", onRender);
  </script>
</body>
</html>
